<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brankas E-dokumen</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">🗄️ Katalog Arsip - Brankas E-dokumen</h4>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table id="tabelArsip" class="table table-striped table-bordered" style="width:100%">
                            <thead>
                                <tr>
                                    <th>ID Arsip</th>
                                    <th>Judul Dokumen</th>
                                    <th>Tanggal Unggah</th>
                                    <th>Uploader</th>
                                    <th>Aksi</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>ARS-2026-001</td>
                                    <td>Contoh Dokumen Awal</td>
                                    <td>2026-05-05</td>
                                    <td>budi_op</td>
                                    <td>
                                        <button class="btn btn-sm btn-info text-white">Baca Ringkasan</button>
                                        <button class="btn btn-sm btn-success">Lihat File Asli</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
    // Inisialisasi DataTables saat halaman dimuat
    $(document).ready(function() {
        $('#tabelArsip').DataTable({
            language: {
                url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/id.json' // Terjemahan Bahasa Indonesia
            }
        });
    });
</script>

</body>
</html>
