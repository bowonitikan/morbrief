<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brankas E-document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <style>
        #dashboard-section { display: none; } /* Sembunyikan dashboard sebelum login */
    </style>
</head>
<body class="bg-light">

<div class="container mt-5" id="login-section">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h4>🔐 Login Brankas</h4>
                </div>
                <div class="card-body">
                    <div id="login-alert" class="alert alert-danger d-none"></div>
                    <div class="mb-3">
                        <label>Username</label>
                        <input type="text" id="username" class="form-control" placeholder="Masukkan Username">
                    </div>
                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Masukkan Password">
                    </div>
                    <button class="btn btn-primary w-100" onclick="prosesLogin()" id="btn-login">Masuk</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container mt-4" id="dashboard-section">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>🗄️ Brankas E-dokumen</h3>
        <div>
            <span class="badge bg-secondary me-2" id="user-info">Role: User</span>
            <button class="btn btn-sm btn-danger" onclick="location.reload()">Logout</button>
        </div>
    </div>

    <div class="card mb-4 shadow-sm" id="upload-card">
        <div class="card-header bg-success text-white">Unggah Dokumen Baru</div>
        <div class="card-body">
            <div id="upload-alert" class="alert d-none"></div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label>Judul Dokumen</label>
                    <input type="text" id="judul" class="form-control">
                </div>
                <div class="col-md-4 mb-3">
                    <label>File PDF</label>
                    <input type="file" id="file" class="form-control" accept="application/pdf">
                </div>
                <div class="col-md-4 mb-3">
                    <label>Ringkasan / Abstrak</label>
                    <textarea id="ringkasan" class="form-control" rows="1"></textarea>
                </div>
            </div>
            <button class="btn btn-success" onclick="prosesUpload()" id="btn-upload">Simpan Arsip</button>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">Pustaka Dokumen</div>
        <div class="card-body">
            <div class="table-responsive">
                <table id="tabelArsip" class="table table-striped table-bordered" style="width:100%">
                    <thead>
                        <tr>
                            <th>ID Arsip</th>
                            <th>Judul Dokumen</th>
                            <th>Tanggal</th>
                            <th>Uploader</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="data-arsip">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalRingkasan" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Ringkasan Dokumen</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p id="teks-ringkasan"></p>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
    let currentUser = "";
    let currentRole = "";

    // 1. PROSES LOGIN
    function prosesLogin() {
        const user = document.getElementById("username").value;
        const pass = document.getElementById("password").value;
        const btn = document.getElementById("btn-login");
        
        btn.innerHTML = "Memeriksa...";
        btn.disabled = true;

        google.script.run.withSuccessHandler(function(response) {
            if (response.success) {
                currentUser = response.username;
                currentRole = response.role;
                document.getElementById("user-info").innerText = `${currentUser} (${currentRole})`;
                
                // Sembunyikan form upload jika role adalah 'Era' [cite: 16]
                if(currentRole === "Era") {
                    document.getElementById("upload-card").style.display = "none";
                }

                document.getElementById("login-section").style.display = "none";
                document.getElementById("dashboard-section").style.display = "block";
                muatTabelArsip();
            } else {
                const alertBox = document.getElementById("login-alert");
                alertBox.innerText = response.message;
                alertBox.classList.remove("d-none");
            }
            btn.innerHTML = "Masuk";
            btn.disabled = false;
        }).verifyLogin(user, pass);
    }

    // 2. PROSES UPLOAD FILE
    function prosesUpload() {
        const fileInput = document.getElementById("file");
        const judul = document.getElementById("judul").value;
        const ringkasan = document.getElementById("ringkasan").value;
        const btn = document.getElementById("btn-upload");
        const alertBox = document.getElementById("upload-alert");

        if (!fileInput.files.length || !judul) {
            alert("Harap lengkapi Judul dan File PDF!");
            return;
        }

        btn.innerHTML = "Mengunggah...";
        btn.disabled = true;

        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            const dataUrl = e.target.result; // Data base64
            google.script.run.withSuccessHandler(function(res) {
                alertBox.classList.remove("d-none", "alert-danger");
                alertBox.classList.add("alert-success");
                alertBox.innerText = res.message;
                
                // Reset form & perbarui tabel
                document.getElementById("judul").value = "";
                document.getElementById("ringkasan").value = "";
                fileInput.value = "";
                muatTabelArsip();
                
                btn.innerHTML = "Simpan Arsip";
                btn.disabled = false;
            }).uploadFileToDrive(dataUrl, file.name, judul, ringkasan, currentUser);
        };
        reader.readAsDataURL(file);
    }

    // 3. MEMUAT DATA TABEL
    let dataTableInstance = null;
    function muatTabelArsip() {
        google.script.run.withSuccessHandler(function(data) {
            let html = "";
            data.forEach(function(row) {
                // Tombol aksi [cite: 33, 34]
                const btnRingkasan = `<button class="btn btn-sm btn-info text-white me-1" onclick="tampilRingkasan('${row.ringkasan}')">Baca</button>`;
                const btnFile = `<a href="${row.url}" target="_blank" class="btn btn-sm btn-success">Lihat File</a>`;
                
                html += `<tr>
                            <td>${row.id}</td>
                            <td>${row.judul}</td>
                            <td>${row.tanggal}</td>
                            <td>${row.uploader}</td>
                            <td>${btnRingkasan} ${btnFile}</td>
                         </tr>`;
            });

            // Hancurkan instance DataTables lama jika ada (untuk refresh)
            if (dataTableInstance) {
                dataTableInstance.destroy();
            }

            document.getElementById("data-arsip").innerHTML = html;
            
            // Inisialisasi DataTables untuk fungsi Sorting & Search [cite: 12, 38]
            dataTableInstance = $('#tabelArsip').DataTable();
        }).getArsipData();
    }

    // 4. TAMPILKAN POP-UP RINGKASAN
    function tampilRingkasan(teks) {
        document.getElementById("teks-ringkasan").innerText = teks || "Tidak ada ringkasan.";
        new bootstrap.Modal(document.getElementById('modalRingkasan')).show();
    }
</script>
</body>
</html>
